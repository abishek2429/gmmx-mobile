name: gmmx_mobile
description: Gmmx mobile app
publish_to: none
version: 1.0.0+100

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  google_fonts: ^6.2.1
  google_sign_in: ^6.3.0
  flutter_svg: ^2.0.10+1
  dio: ^5.0.0
  fl_chart: ^0.68.0
  qr_flutter: ^4.1.0
  animations: ^2.0.11
  shimmer: ^3.0.0
  path_provider: ^2.1.3
  flutter_secure_storage: ^9.0.0
  intl: ^0.20.2
  go_router: ^14.2.0
  flutter_hooks: ^0.21.1
  url_launcher: ^6.3.0
  riverpod_annotation: ^2.3.5
  forui: ^0.18.0
  shared_preferences: ^2.3.0
  mobile_scanner: ^7.2.0
  local_auth: ^2.3.0
  device_info_plus: ^10.1.0
  intl_phone_field: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/logo-gmmx.png"
  web:
    generate: true
    image_path: "assets/images/logo-gmmx.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
