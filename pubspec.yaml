name: gmmx_mobile
description: GMMX MVP mobile app
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_riverpod: ^2.5.1
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  fl_chart: ^0.68.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.0
  animations: ^2.0.11
  shimmer: ^3.0.0
  path_provider: ^2.1.3
  flutter_secure_storage: ^9.0.0
  intl: ^0.19.0
  go_router: ^14.2.0
  flutter_hooks: ^0.21.1
  url_launcher: ^6.3.0
  riverpod_annotation: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
